name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. BUILD BINARIES
  build-binaries:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish (Targeting Linux ARM64)
      run: dotnet publish WhiskeyTracker.Web/WhiskeyTracker.Web.csproj -c Release -r linux-arm64 --self-contained false -o ./publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-binaries
        path: ./publish
        retention-days: 1

  # 2. RUN TESTS
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: whiskeypass
          POSTGRES_DB: whiskey_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Test
      run: dotnet test
      env:
        Database__Provider: Postgres
        Database__ConnectionString: "Host=localhost;Database=whiskey_test_db;Username=postgres;Password=whiskeypass"
        Database__SeedOnStartup: true

  # 3. DEPLOY TO PI CLUSTER
  deploy:
    runs-on: self-hosted
    needs: [build-binaries, test]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: app-binaries
        path: ./publish

    - name: Inject Secrets
      run: |
        echo "${{ secrets.SECRETS_ENV_FILE }}" > k8s/.env
      
    - name: Apply Infrastructure
      run: kubectl apply -k k8s/

    - name: Start Loader Pod
      run: |
        cat <<EOF | kubectl apply -f -
        apiVersion: v1
        kind: Pod
        metadata:
          name: content-loader
        spec:
          containers:
          - name: loader
            image: alpine  # Lightweight, has tar
            command: ["sleep", "3600"]
            volumeMounts:
            - mountPath: /app
              name: app-storage
          volumes:
          - name: app-storage
            persistentVolumeClaim:
              claimName: whiskey-app-pvc
        EOF
        
        echo "Waiting for loader pod..."
        kubectl wait --for=condition=Ready pod/content-loader --timeout=60s

    - name: Check for Pending Migrations
      id: check_migrations
      run: |
        # Get latest from DB
        DB_MIGRATION=$(kubectl exec deployment/postgres -- psql -U postgres -d whiskey_prod -t -c "SELECT \"MigrationId\" FROM \"__EFMigrationsHistory\" ORDER BY \"MigrationId\" DESC LIMIT 1;" | xargs)
        
        # Get latest from code
        LOCAL_MIGRATION=$(find WhiskeyTracker.Web/Migrations -name "[0-9]*.cs" | sort | tail -n 1 | xargs basename -s .cs)
        
        echo "Database latest: $DB_MIGRATION"
        echo "Local code latest: $LOCAL_MIGRATION"
        
        if [ "$DB_MIGRATION" != "$LOCAL_MIGRATION" ]; then
          echo "HAS_NEW_MIGRATIONS=true" >> $GITHUB_ENV
          echo "New migration detected: $LOCAL_MIGRATION"
        else
          echo "HAS_NEW_MIGRATIONS=false" >> $GITHUB_ENV
          echo "No new migrations found."
        fi
      continue-on-error: true

    - name: Backup Database
      if: env.HAS_NEW_MIGRATIONS == 'true'
      run: |
        TIMESTAMP=$(date +%Y%m%d_%H%M%S)
        echo "Streaming backup from DB pod to App PVC (/app/backups)..."
        # Ensure directory exists on PVC
        kubectl exec content-loader -- mkdir -p /app/backups
        # Stream pg_dump through runner into PVC
        kubectl exec deployment/postgres -- pg_dump -U postgres whiskey_prod | \
          kubectl exec -i content-loader -- sh -c "cat > /app/backups/whiskey_prod_$TIMESTAMP.sql"
        # Keep last 7 days of backups on PVC
        kubectl exec content-loader -- find /app/backups -name "*.sql" -mtime +7 -delete
      continue-on-error: true

    - name: Copy Files to NFS
      run: |
        # Clear existing files EXCEPT the backups directory
        kubectl exec content-loader -- find /app -mindepth 1 -maxdepth 1 ! -name 'backups' -exec rm -rf {} +
        
        # Copy new files
        kubectl cp ./publish/. content-loader:/app/
        
        # Verify
        kubectl exec content-loader -- ls -la /app

    - name: Cleanup Loader
      if: always()
      run: kubectl delete pod content-loader --ignore-not-found

    - name: Restart Deployment
      run: kubectl rollout restart deployment/whiskey-web